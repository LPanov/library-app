version: '4'
services:
  inventory-db:
    image: mysql:latest
    container_name: mysql-gs
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: genre_service
    ports:
      - "3308:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql/data:/var/lib/mysql